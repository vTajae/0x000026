setting_type = "select"
default = "7"

[[settings.options]]
value = "6"
label = "6+ (aggressive — more applications)"

[[settings.options]]
value = "7"
label = "7+ (balanced — recommended)"

[[settings.options]]
value = "8"
label = "8+ (selective — fewer, higher quality)"

[[settings.options]]
value = "9"
label = "9+ (very selective — only strong matches)"

[[settings]]
key = "worker_count"
label = "Parallel Workers"
description = "Number of parallel workers for discovery and enrichment stages"
setting_type = "select"
default = "4"

[[settings.options]]
value = "2"
label = "2 workers (conservative)"

[[settings.options]]
value = "4"
label = "4 workers (balanced)"

[[settings.options]]
value = "6"
label = "6 workers (aggressive)"

[[settings]]
key = "boards"
