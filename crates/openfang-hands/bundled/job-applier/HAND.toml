id = "job-applier"
name = "Job Applier Hand"
description = "Autonomous job application pipeline — discovers jobs across boards, scores via OpenFang's Gemini integration (OAuth), tailors resumes, generates cover letters, and applies via stealth browser automation"
category = "productivity"
icon = "💼"
tools = [
    "shell_exec", "file_read", "file_write", "file_list",
    "memory_store", "memory_recall",
    "knowledge_add_entity", "knowledge_add_relation", "knowledge_query",
    "schedule_create", "schedule_list", "schedule_delete",
    "event_publish",
]
skills = ["job-applier"]

# ─── Requirements ─────────────────────────────────────────────────────────────

[[requires]]
key = "docker"
label = "Docker must be installed"
requirement_type = "binary"
check_value = "docker"
description = "Docker is required to run the three job application containers (ApplyPilot, GodsScion, AIHawk)."

[requires.install]
macos = "brew install --cask docker"
windows = "winget install Docker.DockerDesktop"
linux_apt = "sudo apt install docker.io docker-compose-plugin"
linux_pacman = "sudo pacman -S docker docker-compose"
manual_url = "https://docs.docker.com/get-docker/"
estimated_time = "5-10 min"

[[requires]]
key = "docker-compose"
label = "Docker Compose must be available"
requirement_type = "binary"
check_value = "docker"
description = "Docker Compose plugin is required for orchestrating the multi-container stack."

[requires.install]
macos = "Included with Docker Desktop"
windows = "Included with Docker Desktop"
linux_apt = "sudo apt install docker-compose-plugin"
linux_pacman = "sudo pacman -S docker-compose"
manual_url = "https://docs.docker.com/compose/install/"
estimated_time = "1-2 min"

[[requires]]
key = "gemini_cli"
label = "Gemini CLI must be installed (OAuth login)"
requirement_type = "binary"
check_value = "gemini"
description = "Gemini CLI provides LLM access via Google OAuth — no API key needed. LLM calls route through OpenFang's gemini-cli agent."

[requires.install]
manual_url = "https://github.com/google-gemini/gemini-cli"
estimated_time = "2 min"
steps = [
    "npm install -g @google/gemini-cli",
    "Run 'gemini' once to complete OAuth login with your Google account",
]
linux_pacman = "npm install -g @google/gemini-cli"
linux_apt = "npm install -g @google/gemini-cli"
macos = "npm install -g @google/gemini-cli"
windows = "npm install -g @google/gemini-cli"

